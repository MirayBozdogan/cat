<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>

    <style>
        .formDiv {
            width: 410px;
            background-color: rgb(125, 185, 209);
            border-radius: 15px;
        }
    </style>

</head>

<body>
    <div class="formDiv">
        <form>
            <table>
                <tr>
                    <td>Adınız:</td>
                    <td><input type="text"></td>
                </tr>
                <tr>
                    <td>Soyadınız:</td>
                    <td><input type="text"></td>
                </tr>
                <tr>
                    <td>Email: </td>
                    <td><input type="email"></td>
                </tr>
                <tr>
                    <td>Şifre</td>
                    <td><input type="password"></td>
                </tr>
                <tr>
                    <td>Cinsiyet:</td>
                    <td>Kadın<input type="radio" name="cinsiyetradio">
                        Erkek <input type="radio" name="cinsiyetradio">
                    </td>
                </tr>
                <tr>
                    <td>Doğum tarihi:</td>
                    <td><input type="date"></td>
                </tr>
                <tr>
                    <th colspan="2">Hobiler</th>

                </tr>
                <tr>
                    <td>Kitap okumak</td>
                    <td><input type="checkbox"></td>
                </tr>
                <tr>
                    <td>Spor yapmak</td>
                    <td><input type="checkbox"></td>
                </tr>
                <tr>
                    <td>Enstrüman çalmak</td>
                    <td><input type="checkbox"></td>
                </tr>
                <tr>
                    <td><input type="file"></td>
                </tr>
                <tr>
                    <td colspan="2">
                        <textarea name="" id="" placeholder="Mesajıjnız" cols="40" rows="10"></textarea>
                    </td>
                </tr>

                <tr>
                    <td>Okudum,onaylıyorum <input type="radio" name="onayradio"></td>
                </tr>

                <tr>
                    <td>Okudum ,onaylamıyorum <input type="radio" name="onayradio"></td>
                </tr>
                <tr>
                    <td colspan="2">
                        <input type="submit" value="Gönder">
                        <input type="reset" value="Temizle">
                    </td>
                </tr>
            </table>
        </form>

    </div>

</body>

</html>
