<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css"
        integrity="sha512-DxV+EoADOkOygM4IR9yXP8Sb2qwgidEmeqAEmDKIOfPRQZOWbXCzLC6vjbZyy0vPisbH2SyW27+ddLVCN+OMzQ=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>Dropdown Menü</title>
    <style>
        ul {
            list-style-type: none;
            background-color: rgb(67, 69, 69);
            width: 100%;
            height: 50px;
            margin: 0;
            padding: 0;
        }

        ul>li {
            display: inline-block;
            position: relative;
        }

        ul li a {
            text-decoration: none;
            color: white;
            font-family: Arial, Helvetica, sans-serif;
            font-size: larger;
            line-height: 50px;
            padding: 0 15px;
            display: block;
        }

        ul li a:hover {
            color: rgb(62, 113, 179);
        }


        #news-content {
            position: absolute;
            top: 50px;
            left: 0;
            background-color: rgb(67, 69, 69);
            min-width: 100%;
            display: none;
        }

        #news-content ul {
            list-style: none;
            margin: 0;
            padding: 0;
        }

        #news-content li a {
            padding: 10px 15px;
            line-height: normal;
            display: block;
            background-color: rgb(67, 69, 69);
        }


        .news-li:hover #news-content {
            display: block;
        }
    </style>
</head>

<body>

    <ul>
        <li><a href="#"><i class="fa-regular fa-house"></i> Home</a></li>

        <li class="news-li">
            <a href="#">News</a>
            <div id="news-content">
                <ul>
                    <li><a href="#">News 1</a></li>
                    <li><a href="#">News 2</a></li>
                    <li><a href="#">News 3</a></li>
                    <li><a href="#">News 4</a></li>
                </ul>
            </div>
        </li>

        <li><a href="#">Contact</a></li>
        <li><a href="#">About</a></li>
    </ul>

</body>

</html>
